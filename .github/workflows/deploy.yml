# ============================================
# Free-IM-Chat CI/CD
# ============================================

name: Build & Deploy Chat

on:
  push:
    branches: [master, main, dev]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t freechat-chat:latest .

      - name: Save image to file
        run: docker save freechat-chat:latest | gzip > freechat-chat.tar.gz

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "freechat-chat.tar.gz"
          target: "/root/deploy/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            docker stop freechat-chat 2>/dev/null || true
            docker rm   freechat-chat 2>/dev/null || true
            docker rmi  freechat-chat:latest 2>/dev/null || true
            docker load < /root/deploy/freechat-chat.tar.gz
            rm -f /root/deploy/freechat-chat.tar.gz
            docker run -d --name freechat-chat \
              --network host --restart unless-stopped \
              -v /data/app/chat/config:/im-chat/config \
              -v /data/logs/chat:/im-chat/_output/logs \
              freechat-chat:latest
            sleep 2
            docker ps --filter name=freechat-chat
