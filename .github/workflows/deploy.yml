# ============================================
# Free-IM-Chat CI/CD 流水线配置
# 功能：代码推送后自动构建镜像并部署到服务器
# ============================================

name: Build & Deploy Chat

on:
  push:
    branches: [master]        # master 分支推送
  workflow_dispatch:        # 支持手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # 使用 GitHub 免费虚拟机
    
    steps:
      # ----- 1. 拉取代码 -----
      - name: Checkout code
        uses: actions/checkout@v4

      # ----- 2. 构建镜像 -----
      - name: Build Docker image
        run: docker build -t free-im-chat:latest .

      # ----- 3. 压缩镜像（方便传输）-----
      - name: Save image to file
        run: docker save free-im-chat:latest | gzip > Free-IM-Chat.tar.gz

      # ----- 4. 上传到服务器 -----
      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "Free-IM-Chat.tar.gz"
          target: "/root/deploy/"

      # ----- 5. 服务器部署 -----
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            docker load < /root/deploy/free-im-chat.tar.gz
            rm -f /root/deploy/free-im-chat.tar.gz
            docker stop free-im-chat 2>/dev/null || true
            docker rm free-im-chat 2>/dev/null || true
            docker run -d --name free-im-chat --network host --restart unless-stopped -v /data/app/chat/config:/app/config -v /data/logs/chat:/app/logs free-im-chat:latest
            docker ps | grep free-im-chat