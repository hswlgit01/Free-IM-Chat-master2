openIM:
  # OpenIM API address
  # 远程 open IM服务的配置,地址+端口,chat服务与openIm服务之间的通信是采用的http的形式通信
  # 注意: 这个地址会用于生成对外访问的URL(如币种图标),请使用外部可访问的地址
  apiURL: http://localhost:10002
  # OpenIM secret key, must be consistent with OpenIM
  # IM的安全口令,要和IM保持一致,否则无法通信
  secret: test
  # OpenIM administrator userID, must be consistent with OpenIM
  # OpenIM服务的内部管理员用户ID,要与OpenIM服务保持一致,否则无法调通openIM接口
  adminUserID: imAdmin

chatAdmin:
   # Default username and password for the admin
   # 默认的管理员用户,密码和用户名一致
  - "chatAdmin"

# 是否启用权限变更通知
# 当用户角色权限变更时,是否通过imAdmin账号向用户发送通知
# 设置为false可以避免用户收到"暂不支持的消息类型"提示
# Enable permission change notifications
# When user role permissions change, whether to send notifications via imAdmin account
# Set to false to avoid users receiving "unsupported message type" prompts
enablePermissionNotifications: false
